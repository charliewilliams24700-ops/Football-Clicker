<!DOCTYPE html>
<html>
<head>
    <title>Football Clicker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: #0a4d2e;
            color: #fff;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { margin: 10px 0; }
        #money {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        .stats {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        #football {
            width: 180px;
            cursor: pointer;
            transition: transform 0.05s;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        #football:active { transform: scale(0.92); }
        .shop {
            max-width: 400px;
            margin: 30px auto;
            background: #083a23;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #1a5c3a;
        }
        .item {
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            border-radius: 8px;
            margin: 15px 0;
            padding: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .item:hover:not(.disabled):not(.bought) { background: #2d7a4f; }
        .item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .item.bought {
            background: #444;
            border-color: #666;
            cursor: default;
            opacity: 0.7;
        }
        .item-title { font-size: 1.3em; font-weight: bold; }
        .item-desc { font-size: 0.9em; opacity: 0.8; margin-top: 5px; }
        #restart-btn {
            background: #8b0000;
            border: 2px solid #b22222;
            color: white;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        #restart-btn:hover { background: #b22222; }
        #save-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.8em;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <h1>⚽ Football Clicker ⚽</h1>
    <div id="money">£0</div>
    <div class="stats">
        <div>£<span id="perClick">1</span> per click</div>
        <div>£<span id="perSecond">0</span> per second</div>
    </div>
    
    <img id="football" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" alt="Football">

    <div class="shop">
        <h2>Shop</h2>
        <div class="item" id="gloves" onclick="buyGloves()">
            <div class="item-title">Goalkeeper Gloves</div>
            <div class="item-desc">+£2 per click</div>
            <div>Cost: £<span id="gloves-cost">15</span> | Owned: <span id="gloves-owned">0</span></div>
        </div>
        <div class="item" id="boots" onclick="buyBoots()">
            <div class="item-title">Football Boots</div>
            <div class="item-desc">1.2x click multiplier</div>
            <div>Cost: £500 | <span id="boots-status">Not Owned</span></div>
        </div>
        <div class="item" id="striker" onclick="buyStriker()">
            <div class="item-title">Striker</div>
            <div class="item-desc">+£0.5 per second</div>
            <div>Cost: £1,500 | <span id="striker-status">Not Owned</span></div>
        </div>
        <div class="item" id="pitch" onclick="buyPitch()">
            <div class="item-title">Football Pitch</div>
            <div class="item-desc">+£4 per click</div>
            <div>Cost: £<span id="pitch-cost">6,250</span> | Owned: <span id="pitch-owned">0</span></div>
        </div>
        <button id="restart-btn" onclick="restartGame()">Restart Game</button>
    </div>

    <div id="save-status">Auto-saved</div>

<script>
let money = 0;
let basePerClick = 1;
let glovesOwned = 0;
let gloveCost = 15;
let gloveBonus = 2;
let hasBoots = false;
let hasStriker = false;
let pitchOwned = 0;
let pitchCost = 6250;
const BOOTS_COST = 500;
const BOOTS_MULTIPLIER = 1.2;
const STRIKER_COST = 1500;
const STRIKER_INCOME = 0.5;
const PITCH_BONUS = 4;
const PITCH_COST_INCREASE = 100; // +£100 each purchase
const GLOVE_COST_INCREASE = 30;
const STARTING_GLOVE_COST = 15;
const STARTING_PITCH_COST = 6250;

function getPerClick() {
    let perClick = basePerClick + (glovesOwned * gloveBonus) + (pitchOwned * PITCH_BONUS);
    if (hasBoots) perClick = Math.floor(perClick * BOOTS_MULTIPLIER);
    return perClick;
}

function getPerSecond() {
    return hasStriker ? STRIKER_INCOME : 0;
}

document.getElementById('football').onclick = () => {
    money += getPerClick();
    updateDisplay();
    saveGame();
};

function buyGloves() {
    if (money >= gloveCost) {
        money -= gloveCost;
        glovesOwned++;
        gloveCost += GLOVE_COST_INCREASE;
        updateDisplay();
        saveGame();
    }
}

function buyBoots() {
    if (!hasBoots && money >= BOOTS_COST) {
        money -= BOOTS_COST;
        hasBoots = true;
        updateDisplay();
        saveGame();
    }
}

function buyStriker() {
    if (!hasStriker && money >= STRIKER_COST) {
        money -= STRIKER_COST;
        hasStriker = true;
        updateDisplay();
        saveGame();
    }
}

function buyPitch() {
    if (money >= pitchCost) {
        money -= pitchCost;
        pitchOwned++;
        pitchCost += PITCH_COST_INCREASE; // +£100 each time
        updateDisplay();
        saveGame();
    }
}

function restartGame() {
    if (confirm('Are you sure you want to restart? All progress will be lost.')) {
        money = 0;
        glovesOwned = 0;
        gloveCost = STARTING_GLOVE_COST;
        hasBoots = false;
        hasStriker = false;
        pitchOwned = 0;
        pitchCost = STARTING_PITCH_COST;
        localStorage.removeItem('footballClicker');
        updateDisplay();
        document.getElementById('save-status').textContent = 'Game Reset';
        setTimeout(() => document.getElementById('save-status').textContent = 'Auto-saved', 1500);
    }
}

function updateDisplay() {
    document.getElementById('money').textContent = `£${money.toFixed(1)}`;
    document.getElementById('perClick').textContent = getPerClick();
    document.getElementById('perSecond').textContent = getPerSecond();
    document.getElementById('gloves-cost').textContent = gloveCost;
    document.getElementById('gloves-owned').textContent = glovesOwned;
    document.getElementById('pitch-cost').textContent = pitchCost.toLocaleString();
    document.getElementById('pitch-owned').textContent = pitchOwned;
    
    // Gloves
    document.getElementById('gloves').classList.toggle('disabled', money < gloveCost);
    
    // Boots
    const bootsEl = document.getElementById('boots');
    document.getElementById('boots-status').textContent = hasBoots ? 'Owned' : 'Not Owned';
    if (hasBoots) {
        bootsEl.classList.add('bought');
        bootsEl.classList.remove('disabled');
    } else {
        bootsEl.classList.remove('bought');
        bootsEl.classList.toggle('disabled', money < BOOTS_COST);
    }
    
    // Striker
    const strikerEl = document.getElementById('striker');
    document.getElementById('striker-status').textContent = hasStriker ? 'Owned' : 'Not Owned';
    if (hasStriker) {
        strikerEl.classList.add('bought');
        strikerEl.classList.remove('disabled');
    } else {
        strikerEl.classList.remove('bought');
        strikerEl.classList.toggle('disabled', money < STRIKER_COST);
    }
    
    // Pitch
    document.getElementById('pitch').classList.toggle('disabled', money < pitchCost);
}

// Passive income loop
setInterval(() => {
    if (hasStriker) {
        money += STRIKER_INCOME;
        updateDisplay();
        saveGame();
    }
}, 1000);

function saveGame() {
    const save = { money, glovesOwned, gloveCost, hasBoots, hasStriker, pitchOwned, pitchCost };
    localStorage.setItem('footballClicker', JSON.stringify(save));
    document.getElementById('save-status').textContent = 'Saved ✓';
    setTimeout(() => document.getElementById('save-status').textContent = 'Auto-saved', 1000);
}

function loadGame() {
    const save = JSON.parse(localStorage.getItem('footballClicker'));
    if (save) {
        money = save.money || 0;
        glovesOwned = save.glovesOwned || 0;
        gloveCost = save.gloveCost || STARTING_GLOVE_COST;
        hasBoots = save.hasBoots || false;
        hasStriker = save.hasStriker || false;
        pitchOwned = save.pitchOwned || 0;
        pitchCost = save.pitchCost || STARTING_PITCH_COST;
    }
}

loadGame();
updateDisplay();
</script>
</body>
</html>
