<!DOCTYPE html>
<html>
<head>
    <title>Football Clicker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: #0a4d2e;
            color: #fff;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { margin: 10px 0; }
        #money {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        #perClick {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        #football {
            width: 180px;
            cursor: pointer;
            transition: transform 0.05s;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        #football:active { transform: scale(0.92); }
        .shop {
            max-width: 400px;
            margin: 30px auto;
            background: #083a23;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #1a5c3a;
        }
        .item {
            background: #1a5c3a;
            border: 2px solid #2d7a4f;
            border-radius: 8px;
            margin: 15px 0;
            padding: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .item:hover:not(.disabled) { background: #2d7a4f; }
        .item.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .item-title { font-size: 1.3em; font-weight: bold; }
        .item-desc { font-size: 0.9em; opacity: 0.8; margin-top: 5px; }
        #save-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 0.8em;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <h1>⚽ Football Clicker ⚽</h1>
    <div id="money">£0</div>
    <div id="perClick">£1 per click</div>
    
    <img id="football" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" alt="Football">

    <div class="shop">
        <h2>Shop</h2>
        <div class="item" id="gloves" onclick="buyGloves()">
            <div class="item-title">Goalkeeper Gloves</div>
            <div class="item-desc">+£2 per click</div>
            <div>Cost: £<span id="gloves-cost">15</span> | Owned: <span id="gloves-owned">0</span></div>
        </div>
    </div>

    <div id="save-status">Auto-saved</div>

<script>
let money = 0;
let basePerClick = 1;
let glovesOwned = 0;
let gloveCost = 15;
let gloveBonus = 2;
const PRICE_MULTIPLIER = 1.25; // 25% increase per glove now instead of 15%

function getPerClick() {
    return basePerClick + (glovesOwned * gloveBonus);
}

document.getElementById('football').onclick = () => {
    money += getPerClick();
    updateDisplay();
    saveGame();
};

function buyGloves() {
    if (money >= gloveCost) {
        money -= gloveCost;
        glovesOwned++;
        gloveCost = Math.floor(gloveCost * PRICE_MULTIPLIER); 
        updateDisplay();
        saveGame();
    }
}

function updateDisplay() {
    document.getElementById('money').textContent = `£${Math.floor(money)}`;
    document.getElementById('perClick').textContent = `£${getPerClick()} per click`;
    document.getElementById('gloves-cost').textContent = gloveCost;
    document.getElementById('gloves-owned').textContent = glovesOwned;
    
    document.getElementById('gloves').classList.toggle('disabled', money < gloveCost);
}

function saveGame() {
    const save = { money, glovesOwned, gloveCost };
    localStorage.setItem('footballClicker', JSON.stringify(save));
    document.getElementById('save-status').textContent = 'Saved ✓';
    setTimeout(() => document.getElementById('save-status').textContent = 'Auto-saved', 1000);
}

function loadGame() {
    const save = JSON.parse(localStorage.getItem('footballClicker'));
    if (save) {
        money = save.money || 0;
        glovesOwned = save.glovesOwned || 0;
        gloveCost = save.gloveCost || 15;
    }
}

loadGame();
updateDisplay();
</script>
</body>
</html>
